name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # 本仓是 virtual workspace，必须逐 crate 指定 -p 才能带各自的 prod feature
      # （workspace 根直接 `--features prod` 会报错）。prod feature 让 custom-utils
      # 日志写文件而非 stdout，保持各工具的 stdout JSON 契约干净。
      - name: Build
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p github_commit_info --features prod
          cargo build --release --target ${{ matrix.target }} -p hf_watcher --features prod
        env:
          # `cc` crate vars so aws-lc-sys (pulled via reqwest 0.13's rustls
          # feature) builds its C sources with the aarch64 cross-toolchain
          # instead of the host compiler.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar

      # 资产命名 <bin>_<target>[.exe]，与 custom_utils::updater 的
      # `name.contains(bin) && name.contains(target)` 匹配规则对齐。
      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          for bin in github-commit-info hf-watcher; do
            cp "target/${{ matrix.target }}/release/${bin}${{ matrix.ext }}" \
               "dist/${bin}_${{ matrix.target }}${{ matrix.ext }}"
          done
          ls -la dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -la dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
