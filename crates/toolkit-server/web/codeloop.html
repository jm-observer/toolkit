<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codeloop 双栏观测</title>
  <link rel="stylesheet" href="codeloop.css" />
</head>
<body>
  <div id="statusbar">
    <div class="pair-picker">
      <label>Claude
        <select id="claude-select"><option value="">（选择会话）</option></select>
      </label>
      <span class="arrow">⇄</span>
      <label>Codex
        <select id="codex-select"><option value="">（选择会话）</option></select>
      </label>
      <button id="refresh-sessions" title="刷新会话清单">↻</button>
    </div>
    <div class="loop-controls">
      <input id="target-path" type="text" placeholder="target_path（如 docs/foo.md）" />
      <select id="mode-select">
        <option value="design">design</option>
        <option value="implementation">implementation</option>
      </select>
      <input id="max-rounds" type="number" min="1" max="20" value="5" title="max_rounds" />
      <label class="chk"><input id="wait-idle" type="checkbox" /> 等 Claude 空闲</label>
      <button id="start-loop">启动复核循环</button>
    </div>
    <div class="status-right">
      <span id="loop-status" class="idle">循环：未启动</span>
      <span id="loop-rounds"></span>
      <span id="loop-verdict"></span>
      <span id="poll-state">未配对</span>
    </div>
  </div>

  <!-- 模拟选项弹窗（ASK_USER 挂起时） -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h3 id="modal-question">需要你拍板</h3>
      <div id="modal-options"></div>
      <div class="modal-free">
        <input id="modal-free-input" type="text" placeholder="或自由输入答复…" />
        <button id="modal-free-send">发送</button>
      </div>
    </div>
  </div>

  <div id="columns">
    <section class="column" data-side="claude">
      <header class="col-head">
        <span class="col-title">Claude Code</span>
        <span class="col-meta" id="claude-meta">—</span>
      </header>
      <div class="messages" id="claude-messages"></div>
    </section>
    <section class="column" data-side="codex">
      <header class="col-head">
        <span class="col-title">Codex</span>
        <span class="col-meta" id="codex-meta">—</span>
      </header>
      <div class="messages" id="codex-messages"></div>
    </section>
  </div>

  <script src="codeloop.js"></script>
</body>
</html>
