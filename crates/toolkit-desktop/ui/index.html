<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>toolkit-desktop</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #14161a;
        --panel: #1a1d23;
        --panel-2: #20242b;
        --border: #2a2e36;
        --fg: #e6e6e6;
        --muted: #8a8f98;
        --accent: #5eb1ff;
        --ok: #6ed27a;
        --warn: #f4c04e;
        --err: #ef6f6f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 14px;
        font: 12.5px/1.5 "Segoe UI", system-ui, sans-serif;
        background: var(--bg); color: var(--fg);
      }
      h1 { font-size: 13px; margin: 0; font-weight: 600; letter-spacing: .02em; }
      h2 {
        font-size: 10.5px; margin: 0 0 8px;
        color: var(--muted); font-weight: 600;
        text-transform: uppercase; letter-spacing: .06em;
      }
      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 12px;
      }
      .icon-btn {
        background: transparent; border: 1px solid var(--border); color: var(--muted);
        padding: 3px 9px; font-size: 10.5px; border-radius: 4px; cursor: pointer;
        margin: 0;
      }
      .icon-btn:hover { color: var(--fg); border-color: var(--muted); }

      .card {
        margin-bottom: 10px; padding: 10px 12px;
        background: var(--panel); border: 1px solid var(--border); border-radius: 7px;
      }
      .card.tight { padding: 8px 10px; }

      /* ===== status pills ===== */
      .pills-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
        margin-bottom: 8px;
      }
      .status {
        display: flex; align-items: center; justify-content: space-between;
        padding: 7px 10px; background: var(--panel-2); border-radius: 5px;
        border-left: 3px solid var(--muted);
        font-size: 11.5px; cursor: default; user-select: none;
      }
      .status.clickable { cursor: pointer; }
      .status .label { color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; }
      .status .value { font-weight: 600; }
      .status.ok    { border-left-color: var(--ok); }
      .status.ok    .value { color: var(--ok); }
      .status.warn  { border-left-color: var(--warn); }
      .status.warn  .value { color: var(--warn); }
      .status.err   { border-left-color: var(--err); }
      .status.err   .value { color: var(--err); }

      .expiry {
        font-size: 10.5px; color: var(--muted);
        padding: 6px 10px; background: var(--panel-2); border-radius: 5px;
      }

      /* ===== action buttons ===== */
      .actions { display: flex; gap: 5px; flex-wrap: wrap; }
      button {
        margin: 0; padding: 6px 12px;
        background: var(--accent); color: #0b1118;
        border: 0; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 11.5px;
      }
      button.secondary {
        background: transparent; color: var(--fg);
        border: 1px solid var(--border); font-weight: 500;
      }
      button.secondary:hover { border-color: var(--muted); }
      button:active { opacity: 0.7; }

      /* ===== form ===== */
      label { display: block; margin-top: 6px; color: var(--muted); font-size: 10.5px; }
      input[type=text], input[type=password] {
        width: 100%; padding: 5px 8px; margin-top: 3px;
        background: var(--panel-2); color: var(--fg);
        border: 1px solid var(--border); border-radius: 4px;
        font-size: 12px;
      }
      input:focus { outline: none; border-color: var(--accent); }

      .server-row {
        display: flex; gap: 4px; align-items: center; margin-top: 4px;
      }
      .server-row button { padding: 3px 8px; font-size: 10px; }

      /* ===== detail ===== */
      pre {
        margin: 6px 0 0; padding: 6px 8px;
        background: #0f1115; color: var(--muted);
        font-size: 10.5px; overflow: auto; border-radius: 4px;
        max-height: 140px;
        white-space: pre-wrap; word-break: break-all;
      }

      /* ===== footer ===== */
      .footer {
        margin-top: 8px; color: var(--muted); font-size: 10px;
        line-height: 1.5;
      }
      .footer code {
        background: var(--panel); padding: 1px 5px; border-radius: 3px; color: var(--fg);
        font-size: 9.5px;
      }

      /* ===== toast ===== */
      #toast {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%) translateY(-20px);
        background: var(--ok); color: #0b1118; font-weight: 600;
        padding: 6px 14px; border-radius: 14px; font-size: 11.5px;
        opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
        box-shadow: 0 2px 14px rgba(0,0,0,.5); z-index: 100; white-space: nowrap;
        max-width: calc(100% - 20px);
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      #toast.toast-warn { background: var(--warn); }
      #toast.toast-err { background: var(--err); color: #fff; }
    </style>
  </head>
  <body>
    <div id="toast"></div>

    <div class="topbar">
      <h1>toolkit-desktop</h1>
      <button id="copyDetail" class="icon-btn">复制日志</button>
    </div>

    <!-- ===== 状态总览 ===== -->
    <div class="card">
      <h2>cookie 状态</h2>
      <div class="pills-grid">
        <div class="status clickable" id="connStatus" title="点击重连">
          <span class="label">G10</span>
          <span class="value" id="connValue">—</span>
        </div>
        <div class="status" id="douyinStatus">
          <span class="label">抖音</span>
          <span class="value" id="douyinValue">—</span>
        </div>
        <div class="status" id="thsStatus">
          <span class="label">同花顺</span>
          <span class="value" id="thsValue">—</span>
        </div>
        <div class="status" id="msStatus">
          <span class="label">msToken</span>
          <span class="value" id="msValue">—</span>
        </div>
      </div>
      <div class="expiry" id="expiryInfo" title="hover 看每个关键 cookie 明细">登录失效：—</div>
    </div>

    <!-- ===== 平台登录 ===== -->
    <div class="card tight">
      <h2>登录</h2>
      <div class="actions">
        <button id="login">抖音登录</button>
        <button id="closeLogin" class="secondary">关</button>
        <button id="thsLogin">同花顺登录</button>
        <button id="thsClose" class="secondary">关</button>
      </div>
    </div>

    <!-- ===== 解析（desktop 侧唯一业务动作） ===== -->
    <div class="card tight">
      <h2>解析（写入 G10 博主库）</h2>
      <div class="actions">
        <button id="trackCreator">解析当前博主</button>
      </div>
      <div style="font-size:10.5px;color:var(--muted);margin-top:6px;">
        在抖音登录窗里点进博主主页，回这里点按钮。G10 落库后到 web 控制台看博主列表。
      </div>
    </div>

    <!-- ===== Server 配置 ===== -->
    <div class="card tight">
      <h2>G10 server</h2>
      <input id="server" type="text" placeholder="http://g10:8788" />
      <div class="server-row">
        <button class="secondary" data-preset="http://127.0.0.1:8788">本机</button>
        <button class="secondary" data-preset="http://g10:8788">G10</button>
        <div style="flex:1"></div>
        <button id="save">保存</button>
      </div>
      <label>Bearer token（可选）
        <input id="token" type="password" />
      </label>
    </div>

    <!-- ===== 详情/日志 ===== -->
    <div class="card tight">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2 style="margin:0;">详情</h2>
        <button id="inspect" class="icon-btn" style="font-size:10px;padding:2px 7px;">诊断 cookies</button>
      </div>
      <pre id="detail">等待事件…</pre>
    </div>

    <div class="footer">
      workspace: <code id="wsPath">—</code><br/>
      bridge: <code>127.0.0.1:28788</code> · 业务请到 G10 web 控制台
    </div>

    <script src="app.js"></script>
  </body>
</html>
