[package]
name = "github_commit_info"
version = "0.2.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.13", default-features = false, features = ["json", "query", "rustls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
log = "0.4"
clap = { version = "4.5", features = ["derive"] }
custom-utils = { version = "0.14.1", features = ["updater"] }
anyhow = "1"
[[bin]]
name = "github-commit-info"
path = "src/main.rs"

[profile.release]
strip = true
lto = true

[features]
default = []
prod = ["custom-utils/prod"]
