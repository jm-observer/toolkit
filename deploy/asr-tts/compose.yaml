# toolkit 语音底座编排：仅 TTS（CosyVoice2）。
# ASR 由 streaming-speech 仓的 FunASR 服务统一提供（GB10:9101 /transcribe），
# 不在本编排范围内 —— 见 deploy/asr-tts/README.md 历史说明。
#
# 与 toolkit-server 同机部署（G10）。
#
# 运行：
#   docker compose -f compose.yaml up -d

services:
  # ---------------------------------------------------------------------------
  # TTS：CosyVoice2（保留 Python，纳入编排）。toolkit-server 的
  # /api/web/audio/tts 代理转发到这里（TTS_BASE_URL=http://127.0.0.1:8095）。
  #
  # 镜像 cosyvoice2:bakeoff 由 streaming-speech/server/tts/Dockerfile.cosyvoice
  # 构建（arm64+CUDA13 全栈，~10-15min）。本编排默认复用已构建镜像；若本机没有，
  # 先按 streaming-speech/server/tts/README.md 构建好该镜像再 up。
  # ---------------------------------------------------------------------------
  tts:
    image: cosyvoice2:bakeoff
    runtime: nvidia
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - COSYVOICE_MODEL=/models/CosyVoice2-0.5B
      # FP16 推理：~30-40% 提速。如发现音质劣化，改回 0 并重启即可。
      # 注意：FP16 与启动预热（TTS_WARMUP，默认开）依赖 streaming-speech 6ee22fe 之后的
      # cosy_server.py——G10 上的 cosyvoice2:bakeoff 镜像需用其最新代码重建后才生效。
      - COSYVOICE_FP16=1
      - TTS_PORT=8095
      - VOICES_DIR=/voices
    volumes:
      - ${TTS_MODELS_DIR:-/home/fengqi/funasr-prep/models}:/models:ro
      - ${TTS_IO:-/home/fengqi/tts-io}:/io
      # 音色库（voices.json + *.wav），热可编辑（/voices 每次请求重读）。
      - ${TTS_VOICES:-/home/fengqi/tts-voices}:/voices:ro
    ports:
      # 仅本机可达：对外统一走 toolkit-server 的 /api/web/audio/tts 代理。
      - "127.0.0.1:8095:8095"
